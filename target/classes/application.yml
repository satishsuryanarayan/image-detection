spring:
  config:
    import: optional:configtree:/run/secrets/
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/image_detection}
    username: ${SPRING_DATASOURCE_USERNAME:image_user}
    password: ${SPRING_DATASOURCE_PASSWORD:image_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

imagga:
  api-key: ${IMAGGA_API_KEY:}
  api-secret: ${IMAGGA_API_SECRET:}
  threshold: ${IMAGGA_THRESHOLD:70}
  limit: ${IMAGGA_LIMIT:-1}
  connection-timeout-seconds: ${IMAGGA_CONNECTION_TIMEOUT_SECONDS:1}
  request-timeout-seconds: ${IMAGGA_REQUEST_TIMEOUT_SECONDS:2}